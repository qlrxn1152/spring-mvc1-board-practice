<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 상세</title>
</head>
<body>

<h1>게시글 상세</h1>

<div th:if="${param.editStatus}">
    <p>게시글이 수정되었습니다.</p>
</div>

<hr>

<div>
    <label>ID: </label>
    <span th:text="${post.postId}">1</span>
</div>

<div>
    <label>제목: </label>
    <span th:text="${post.title}">제목</span>
</div>

<div>
    <label>내용: </label>
    <p th:text="${post.content}">내용</p>
</div>

<hr>

<a th:href="@{/posts/{postId}/edit(postId=${post.postId})}">수정</a>
<a href="/posts">목록</a>

<form th:action="@{/posts/{postId}/delete(postId=${post.postId})}" method="post" style="display:inline;">
    <button type="submit">삭제</button>
</form>

</body>
</html>
