<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시글 상세</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">
    <div class="card">
        <div th:if="${param.editStatus}" class="alert">
            게시글이 수정되었습니다.
        </div>

        <div class="header">
            <div>
                <h1>게시글 상세</h1>
                <p class="description">선택한 게시글의 상세 내용을 확인합니다.</p>
            </div>
        </div>

        <div class="detail-row">
            <div class="detail-label">ID</div>
            <div class="detail-value" th:text="${post.postId}">1</div>
        </div>

        <div class="detail-row">
            <div class="detail-label">제목</div>
            <div class="detail-value" th:text="${post.title}">제목</div>
        </div>

        <div class="detail-row">
            <div class="detail-label">내용</div>
            <div class="detail-value" th:text="${post.content}">내용</div>
        </div>

        <div class="actions">
            <a th:href="@{/posts/{postId}/edit(postId=${post.postId})}" class="btn btn-primary">수정</a>
            <a href="/posts" class="btn btn-secondary">목록</a>

            <form th:action="@{/posts/{postId}/delete(postId=${post.postId})}" method="post">
                <button type="submit" class="btn btn-danger">삭제</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
