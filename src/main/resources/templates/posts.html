<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시글 목록</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">
    <div class="card">
        <div th:if="${param.deleteStatus}" class="alert">
            게시글이 삭제되었습니다.
        </div>

        <div class="header">
            <div>
                <h1>게시글 목록</h1>
                <p class="description">Spring MVC1 요청 흐름을 연습하기 위한 게시판입니다.</p>
            </div>

            <a href="/posts/new" class="btn btn-primary">게시글 작성</a>
        </div>

        <table class="table" th:if="${!posts.isEmpty()}">
            <thead>
            <tr>
                <th>ID</th>
                <th>제목</th>
                <th>내용</th>
                <th>조회수</th>
                <th>작성일</th>
                <th>수정일</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="post : ${posts}">
                <td th:text="${post.postId}">1</td>

                <td>
                    <a th:href="@{/posts/{postId}(postId=${post.postId})}"
                       th:text="${post.title}">
                        제목
                    </a>
                </td>

                <td th:text="${post.content}">내용</td>

                <td th:text="${post.viewCount}">0</td>

                <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">
                    2026-05-11 12:00
                </td>

                <td th:text="${#temporals.format(post.updatedAt, 'yyyy-MM-dd HH:mm')}">
                    2026-05-11 12:00
                </td>
            </tr>
            </tbody>
        </table>

        <div class="empty" th:if="${posts.isEmpty()}">
            아직 등록된 게시글이 없습니다.
        </div>

        <div class="actions">
            <a href="/" class="btn btn-secondary">홈으로</a>
        </div>
    </div>
</div>

</body>
</html>
