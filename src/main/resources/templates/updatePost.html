<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>게시글 수정</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">
  <div class="card">
    <div class="header">
      <div>
        <h1>게시글 수정</h1>
        <p class="description">게시글 제목과 내용을 수정합니다.</p>
      </div>
    </div>

    <form th:action="@{/posts/{postId}/edit(postId=${post.postId})}" method="post">
      <div class="form-group">
        <label for="title">제목</label>
        <input type="text" id="title" name="title" th:value="${post.title}">
      </div>

      <div class="form-group">
        <label for="content">내용</label>
        <textarea id="content" name="content" th:text="${post.content}"></textarea>
      </div>

      <div class="actions">
        <button type="submit" class="btn btn-primary">수정 완료</button>
        <a th:href="@{/posts/{postId}(postId=${post.postId})}" class="btn btn-secondary">취소</a>
        <a href="/posts" class="btn btn-secondary">목록</a>
      </div>
    </form>
  </div>
</div>

</body>
</html>
