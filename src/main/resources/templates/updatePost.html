<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>게시글 수정</title>
</head>
<body>

<h1>게시글 수정</h1>

<form th:action="@{/posts/{postId}/edit(postId=${post.postId})}" method="post">
  <div>
    <label for="title">제목</label>
    <input type="text" id="title" name="title" th:value="${post.title}">
  </div>

  <div>
    <label for="content">내용</label>
    <textarea id="content" name="content" th:text="${post.content}"></textarea>
  </div>

  <button type="submit">수정</button>
</form>

<hr>

<a th:href="@{/posts/{postId}(postId=${post.postId})}">취소</a>
<a href="/posts">목록</a>

</body>
</html>
